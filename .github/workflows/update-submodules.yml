name: Update Submodule Pointers

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 6 * * *'
    - cron: '30 10 * * *'
    - cron: '30 14 * * *'
    - cron: '30 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LATEX_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Update all submodules to latest
        run: |
          git submodule foreach --quiet '
            origin_url=$(git config --get remote.origin.url)
            if [[ "$origin_url" == https://github.com/* ]] && [[ "$origin_url" != *x-access-token* ]]; then
              auth_url=$(echo "$origin_url" | sed "s|https://github.com/|https://x-access-token:${{ secrets.LATEX_PAT }}@github.com/|")
              git remote set-url origin "$auth_url"
            fi
          '
          git submodule update --remote --merge

      - name: Push if changed
        run: |
          if git diff --quiet; then
            echo "All submodules already up to date."
          else
            git add -A
            git commit -m "chore: update submodule pointers to latest commits"
            git push origin main
            echo "Submodules updated."
          fi
