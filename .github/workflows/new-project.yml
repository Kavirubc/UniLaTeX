name: Scaffold New LaTeX Project

on:
  issues:
    types: [labeled]

jobs:
  scaffold:
    if: contains(github.event.issue.labels.*.name, 'new-project') && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout hub repo (for templates)
        uses: actions/checkout@v4

      - name: Parse issue form fields
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const get = (label) => {
              const re = new RegExp(`### ${label}\\s*\\n+([^\\n#]+)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            };
            const repoName = get('Repository name').replace(/[^a-zA-Z0-9_-]/g, '-').toLowerCase();
            const title    = get('Paper / project title');
            const authors  = get('Author\\(s\\)');
            const inst     = get('Institution');
            const collabs  = get('GitHub collaborators to invite \\(optional\\)');
            core.setOutput('repo_name',     repoName);
            core.setOutput('title',         title);
            core.setOutput('authors',       authors);
            core.setOutput('institution',   inst);
            core.setOutput('collaborators', collabs);

      - name: Create repo and scaffold
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.LATEX_PAT }}
          REPO:     ${{ steps.parse.outputs.repo_name }}
          TITLE:    ${{ steps.parse.outputs.title }}
          AUTHORS:  ${{ steps.parse.outputs.authors }}
          INST:     ${{ steps.parse.outputs.institution }}
          COLLABS:  ${{ steps.parse.outputs.collaborators }}
          OWNER:    ${{ github.repository_owner }}
          HUB_REPO: ${{ github.event.repository.name }}
          HUB_FULL: ${{ github.event.repository.full_name }}
        run: |
          set -euo pipefail

          # 1. Create private repo
          gh repo create "$OWNER/$REPO" --private --description "$TITLE" --clone
          cd "$REPO"

          # Configure git identity for the CI runner
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Set remote URL with token for push authentication
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/$OWNER/$REPO.git"

          # 2. Copy template files from hub
          cp ../template/.gitignore .
          cp ../template/.latexmkrc .
          cp ../template/Makefile .
          cp ../template/references.bib .

          mkdir -p .github/workflows .vscode Diagrams Tables
          cp ../template/.github/workflows/build.yml .github/workflows/
          cp ../template/.vscode/settings.json .vscode/
          cp ../template/.vscode/extensions.json .vscode/

          touch Diagrams/.gitkeep Tables/.gitkeep

          # 3. Generate main.tex with title/authors/institution injected
          python3 - << 'PYEOF'
          import os
          with open('../template/main.tex') as f:
              content = f.read()
          content = content.replace('{{PAPER_TITLE}}', os.environ['TITLE'])
          content = content.replace('{{AUTHORS}}',     os.environ['AUTHORS'])
          content = content.replace('{{INSTITUTION}}', os.environ['INST'])
          with open('main.tex', 'w') as f:
              f.write(content)
          PYEOF

          # 4. Generate README
          python3 - << 'PYEOF'
          import os
          title   = os.environ['TITLE']
          authors = os.environ['AUTHORS']
          inst    = os.environ['INST']
          owner   = os.environ['OWNER']
          hub     = os.environ['HUB_REPO']
          readme = (
              f"# {title}\n\n"
              f"> Scaffolded from [{hub}](https://github.com/{owner}/{hub}).\n\n"
              f"**Authors:** {authors}\n"
              + (f"**Institution:** {inst}\n\n" if inst else "\n")
              + "## Build\n\n"
              "```bash\n"
              "make        # build PDF\n"
              "make watch  # live-reload\n"
              "make clean  # remove aux files\n"
              "```\n\n"
              "## Reference Management\n\n"
              "Export your Zotero collection with Better BibLaTeX, enable **Keep updated**, "
              "and save as `references.bib` in this directory.\n"
          )
          with open('README.md', 'w') as f:
              f.write(readme)
          PYEOF

          # 5. Commit and push
          git checkout -b main
          git add -A
          git commit -m "chore: scaffold from $HUB_REPO template"
          git push --set-upstream origin main

          # 6. Invite collaborators
          if [ -n "$COLLABS" ]; then
            IFS=',' read -ra USERS <<< "$COLLABS"
            for u in "${USERS[@]}"; do
              u="${u#"${u%%[![:space:]]*}"}"   # ltrim
              u="${u%"${u##*[![:space:]]}"}"   # rtrim
              if [[ ! "$u" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,37}[a-zA-Z0-9])?$ ]]; then
                echo "::warning::Skipping invalid GitHub username: '$u'"
                continue
              fi
              if ! gh api "repos/$OWNER/$REPO/collaborators/$u" -X PUT -f permission=push; then
                echo "::warning::Failed to invite collaborator: $u"
              fi
            done
          fi

          # 7. Add new repo as submodule in the hub
          cd "$GITHUB_WORKSPACE"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/$HUB_FULL.git"

          git submodule add "https://x-access-token:${GH_TOKEN}@github.com/$OWNER/$REPO.git" "projects/$REPO"
          git config --file .gitmodules "submodule.projects/$REPO.url" "https://github.com/$OWNER/$REPO.git"
          git add .gitmodules "projects/$REPO"
          git commit -m "feat: add $REPO as submodule"
          git push origin main

          echo "REPO_URL=https://github.com/$OWNER/$REPO" >> "$GITHUB_ENV"

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LATEX_PAT }}
          script: |
            const repoUrl = process.env.REPO_URL;
            const repoName = '${{ steps.parse.outputs.repo_name }}';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: `## Project created\n\n**Repository:** ${repoUrl}\n\n\`\`\`bash\ngit clone ${repoUrl}\ncd ${repoName}\nmake\n\`\`\`\n\nSet up Zotero Better BibTeX auto-export to \`references.bib\` to enable citation management.`
            });
            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
